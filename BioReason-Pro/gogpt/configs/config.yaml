defaults:
  - _self_
  - experiment: ???  # Must specify an experiment

hydra:
  mode: RUN
  run:
    dir: artifacts/training/${experiment_name}/${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: artifacts/training/${experiment_name}/sweeps/${now:%Y-%m-%d_%H-%M-%S}
    subdir: ${hydra.job.num}
  job:
    chdir: true
  job_logging:
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
